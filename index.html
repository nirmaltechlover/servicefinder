<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Local Service Finder</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Hero Section -->

    <section class="hero">

        <div class="overlay">

            <h1>
                Find Trusted Local Services
            </h1>

            <p>
                Search verified service providers in your city
            </p>

            <div class="search-box">

                <div class="field">

                    <label>
                        <i class="fa-solid fa-location-dot"></i>
                        City
                    </label>

                    <select id="city">

                        <option value="">
                            Select City
                        </option>

                    </select>

                </div>

                <div class="field">

                    <label>
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        Service
                    </label>

                    <select id="service">

                        <option value="">
                            Select Service
                        </option>

                    </select>

                </div>

                <button onclick="loadProviders()">

                    <i class="fa-solid fa-magnifying-glass"></i>
                    Search

                </button>

            </div>

        </div>

    </section>

    <!-- Popular Services -->

    <section>

        <h2 class="section-title">

            Popular Services

        </h2>

        <div class="service-icons">

            <div>
                🔧
                <span>Plumber</span>
            </div>

            <div>
                ⚡
                <span>Electrician</span>
            </div>

            <div>
                🪚
                <span>Carpenter</span>
            </div>

            <div>
                🎨
                <span>Painter</span>
            </div>

            <div>
                ❄️
                <span>AC Technician</span>
            </div>

            <div>
                🧹
                <span>Cleaner</span>
            </div>

        </div>

    </section>

    <!-- Providers Section -->

    <section>

        <h2 class="section-title">

            Service Providers

        </h2>

        <div id="result"
             class="providers">

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>
            © 2026 Local Service Finder |
            Built with Node.js, Express, MySQL & Azure VM
        </p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
